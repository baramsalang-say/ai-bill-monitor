name: AI Bill Monitor Job

on:
  schedule:
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # v3에서 v4로 업데이트 (경고 해결)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml
      - name: Run Script
        run: python monitor.py
        env:
          MY_EMAIL_PW: ${{ secrets.MY_EMAIL_PW }}
